name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-android:
    runs-on: ubuntu-22.04

    container:
      image: kivy/buildozer:latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Verificar archivos
        run: |
          pwd
          ls -la
          test -f main.py
          test -f buildozer.spec

      - name: Corregir permiso root de Buildozer
        run: |
          sed -i 's/warn_on_root = 1/warn_on_root = 0/g' buildozer.spec
          grep -n "warn_on_root" buildozer.spec

      - name: Limpiar salida anterior
        run: |
          rm -rf bin
          rm -rf .buildozer/android/app

      - name: Compilar APK
        run: |
          buildozer android debug

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: cobros-v12-campo-apk
          path: bin/*.apk

name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip python3-setuptools python3-wheel \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev \
            libltdl-dev

      - name: Instalar Buildozer
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install buildozer cython==0.29.36

      - name: Crear licencias Android para Buildozer
        run: |
          mkdir -p /home/runner/.buildozer/android/platform/android-sdk/licenses
          cat > /home/runner/.buildozer/android/platform/android-sdk/licenses/android-sdk-license << 'EOF'
          24333f8a63b6825ea9c5514f83c2829b004d1fee
          84831b9409646a918e30573bab4c9c91346d8abd
          d56f5187479451eabf01fb78af6dfcb131a6481e
          8933bad161af4178b1185d1a37fbf41ea5269c55
          EOF

      - name: Limpiar compilaciones anteriores
        run: |
          rm -rf bin
          rm -rf .buildozer/android/app

      - name: Compilar APK
        run: |
          buildozer android debug

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: cobros-v12-campo-apk
          path: bin/*.apk

name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias del sistema
        run: |
          sudo apt update
          sudo apt install -y \
            git \
            zip \
            unzip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libffi-dev \
            libssl-dev \
            libltdl-dev

      - name: Instalar Buildozer y Cython
        run: |
          python -m pip install --upgrade pip
          python -m pip install buildozer cython==0.29.36

      - name: Verificar archivos
        run: |
          ls -la
          test -f main.py
          test -f buildozer.spec

      - name: Corregir warn_on_root
        run: |
          sed -i 's/warn_on_root = 1/warn_on_root = 0/g' buildozer.spec || true
          grep -n "warn_on_root" buildozer.spec || true

      - name: Limpiar compilación anterior
        run: |
          buildozer android clean || true
          rm -rf bin || true

      - name: Compilar APK debug
        run: |
          yes | buildozer android debug

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: CobrosV12Campo-APK
          path: bin/*.apk

name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-android:
    runs-on: ubuntu-22.04
    container:
      image: kivy/buildozer:latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Ver archivos del proyecto
        run: |
          pwd
          ls -la
          ls -la assets || true

      - name: Compilar APK con Buildozer Docker
        run: |
          buildozer android debug

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: cobros-v12-campo-apk
          path: bin/*.apk
